<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sticky Notes{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --accent2: #f5a623;
      --text: #eaeaea;
      --text-muted: #8892a4;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(233,69,96,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(245,166,35,0.08) 0%, transparent 50%);
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26,26,46,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-brand {
      font-family: 'Caveat', cursive;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent2);
      text-decoration: none;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-brand span { font-size: 1.4rem; }

    .nav-links { display: flex; align-items: center; gap: 0.5rem; }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: var(--border); }

    .nav-btn {
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: #c73652; transform: translateY(-1px); }

    .nav-user {
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      background: var(--border);
      border-radius: 8px;
    }

    /* MAIN */
    main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }

    /* MESSAGES */
    .messages { margin-bottom: 1.5rem; }
    .message {
      padding: 0.875rem 1.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      border-left: 4px solid;
    }
    .message.success { background: rgba(34,197,94,0.1); border-color: #22c55e; color: #86efac; }
    .message.error { background: rgba(233,69,96,0.1); border-color: var(--accent); color: #fca5a5; }
    .message.info { background: rgba(99,179,237,0.1); border-color: #63b3ed; color: #90cdf4; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.4rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #c73652; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(233,69,96,0.4); }
    .btn-secondary { background: var(--border); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-danger { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid rgba(233,69,96,0.3); }
    .btn-danger:hover { background: var(--accent); color: white; }
    .btn-sm { padding: 0.4rem 0.85rem; font-size: 0.8rem; }

    /* FORMS */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      max-width: 580px;
      margin: 0 auto;
      box-shadow: var(--shadow);
    }

    .form-title {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: var(--accent2);
    }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(233,69,96,0.15);
    }
    textarea { resize: vertical; min-height: 150px; }

    input[type="color"].color-picker {
      height: 48px;
      padding: 4px;
      border-radius: 10px;
      cursor: pointer;
      width: 80px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .checkbox-group label {
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
    }

    .errorlist {
      list-style: none;
      margin-top: 0.4rem;
    }
    .errorlist li {
      color: #fca5a5;
      font-size: 0.82rem;
    }

    .helptext {
      display: block;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* PAGE HEADER */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-header h1 {
      font-family: 'Caveat', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--text);
    }
    .page-header h1 span { color: var(--accent2); }

    /* SEARCH */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      max-width: 380px;
      width: 100%;
    }
    .search-bar input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 10px;
    }
    .search-bar button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .search-bar button:hover { background: #c73652; }

    /* AUTH FOOTER */
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .auth-footer a { color: var(--accent2); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    /* CHAR COUNTER */
    .char-counter {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      transition: color 0.2s;
    }
    .char-counter.warning { color: var(--accent2); }
    .char-counter.danger { color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <a href="{% url 'note_list' %}" class="nav-brand">
    <span>📝</span> Sticky Notes
  </a>
  <div class="nav-links">
    {% if user.is_authenticated %}
      <a href="{% url 'note_list' %}" class="nav-link">My Notes</a>
      <a href="{% url 'note_create' %}" class="nav-link">+ New</a>
      <span class="nav-user">👤 {{ user.username }}</span>
      <form method="post" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-secondary btn-sm" style="cursor:pointer;">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class="nav-link">Login</a>
      <a href="{% url 'register' %}" class="nav-btn">Sign Up</a>
    {% endif %}
  </div>
</nav>

<main>
  {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
